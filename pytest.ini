[pytest]
# ===== 测试用例目录 =====
testpaths = testcases

# ===== 用例文件 / 类 / 函数 命名规则 =====
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ===== 默认运行参数 =====
# -v            显示详细用例名
# -s            允许打印输出
# --alluredir   Allure 原始结果输出目录
# --clean-alluredir 每次运行清空旧结果
addopts =
    -v
    -s
    --alluredir=reports/allure-results
    --clean-alluredir

# ===== 自定义标记（按用例类型/层级分类执行）=====
markers =
    api: 接口测试用例
    ui: 界面测试用例（playwright）
    smoke: 冒烟测试用例
    regression: 回归测试用例
