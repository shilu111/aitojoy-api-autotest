# Midscene.js YAML 脚本示例（零代码 AI UI 测试）
# 执行命令：npx midscene ./midscene/yaml/login.yaml
# 运行前需在 .env 配置大模型 API Key 与 WEB_URL

web:
  # 被测页面地址（也可写死完整 URL）
  url: https://your-web-host.com
  viewportWidth: 1920
  viewportHeight: 1080

tasks:
  - name: AI 登录
    flow:
      # aiInput: 自然语言定位输入框并输入
      - aiInput: test_user
        locate: 用户名输入框
      - aiInput: test_pass
        locate: 密码输入框
      # aiTap: 自然语言定位并点击
      - aiTap: 登录按钮
      # aiAssert: 自然语言断言
      - aiAssert: 页面已登录成功，显示首页或用户信息
